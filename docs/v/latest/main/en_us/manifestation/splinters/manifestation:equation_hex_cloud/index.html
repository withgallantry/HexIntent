      <meta property="og:description" content="Creates large particle effects from an Equation Particle iota without pushing huge point lists through the stack each cast, which helps keep it performant for complex visuals.Inputs: origin: world-space vector where the cloud is rooted, OR anchor: entity center to follow, OR anchor + offset: entity center plus offset vector. equation: Equation Particle iota that defines point layout and color behavior. id: numeric cloud identifier.Using the same id updates/replaces the previous cloud channel instead of spawning a brand new one each time, which gives smoother continuous animation in repeating casts (including quines).Before dispatch, the equation is validated against the server evaluation budget." />
