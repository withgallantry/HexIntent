      <meta property="og:description" content="Creates a smooth, stateful trail channel keyed by id. Each cast appends one new point at position; the prior point is remembered automatically. Segments longer than 10 blocks do not connect.Inputs: position: world-space vector for the new point. color from: RGB vector (0..1) at the start of the color cycle. color to: RGB vector (0..1) at the end of the color cycle. ticks: positive transition duration for color ping-pong. id: numeric trail channel key; reuse to continue the same trail. type?: optional style index, rounded and clamped to 0..14 (default 0).Types: 0 dust ribbon, 1 sparks, 2 trail, 3 pulse beads, 4 end rod, 5 witch plume, 6 enchant flecks, 7 soul flame beads, 8 solid beam, 9 ring lattice, 10 lightning arc, 11 hex conjure ribbon, 12 hex conjure sparks, 13 hex conjure trail, 14 dual-helix. Color vectors tint types 0-3 and 8-14; types 4-7 use native particle colors." />
